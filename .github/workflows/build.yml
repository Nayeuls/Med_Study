name: Build

# Déclenchement :
#   - manuellement (onglet Actions → Build → Run workflow)
#   - automatiquement en poussant un tag de version (ex: git tag v1.0 && git push --tags)
on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            adddata: "src;src"
            extra: "--windowed"
          # macos-13 = runner Intel (x86_64). Le binaire x86_64 tourne PARTOUT :
          # nativement sur Mac Intel, et via Rosetta (auto) sur Mac Apple Silicon.
          - os: macos-13
            label: macOS
            adddata: "src:src"
            extra: "--windowed"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Compiler l'exécutable
        run: pyinstaller --onefile ${{ matrix.extra }} --name Revisions --add-data "${{ matrix.adddata }}" server.py

      # macOS : on empaquette le .app dans un zip pour préserver la structure du bundle
      - name: Zipper le .app (macOS)
        if: matrix.label == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent Revisions.app Revisions-macOS.zip

      - name: Publier l'artéfact
        uses: actions/upload-artifact@v4
        with:
          name: Revisions-${{ matrix.label }}-${{ github.sha }}
          path: |
            dist/Revisions.exe
            dist/Revisions-macOS.zip
          if-no-files-found: ignore
